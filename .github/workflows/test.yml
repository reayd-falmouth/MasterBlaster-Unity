name: Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  test:
    name: Run Unity tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;generateAdditionalReports;assemblyFilters:+Scripts;pathFilters:-**/Tests/**"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test results
          path: artifacts

      - name: Upload coverage results
        uses: actions/upload-artifact@v4
        if: always() && steps.tests.outputs.coveragePath != ''
        with:
          name: Coverage results
          path: ${{ steps.tests.outputs.coveragePath }}

      # Codecov shows coverage in GitHub (PR comments, badge). Add secret CODECOV_TOKEN from https://codecov.io for private repos; optional for public.
      - name: Upload coverage to Codecov
        if: steps.tests.outputs.coveragePath != ''
        uses: codecov/codecov-action@v4
        with:
          directory: ${{ steps.tests.outputs.coveragePath }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
