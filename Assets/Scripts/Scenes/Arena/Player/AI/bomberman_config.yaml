# ML-Agents training config for Bomberman-style agent.
# Run: mlagents-learn bomberman_config.yaml --run-id=bomberman_v1
# Behavior name in Unity Behavior Parameters must match: Bomberman

behaviors:
  Bomberman:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 500000
    time_horizon: 512
    summary_freq: 5000
    keep_checkpoints: 3
    checkpoint_interval: 20000
