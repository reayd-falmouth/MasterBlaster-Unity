# ML-Agents training config for Bomberman-style agent.
# Stage 1 (solo): agent learns to place bombs and destroy blocks without an opponent.
# Stage 2 (vs opponent): set playerCount back to 2 and re-enable rewardKillOpponent.
# Run: mlagents-learn bomberman_config.yaml --run-id=solo_v1

behaviors:
  Bomberman:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 4096
      learning_rate: 5.0e-4
      learning_rate_schedule: linear
      beta: 1.5e-2        # high entropy = lots of exploration early on
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256   # wider network benefits the larger obs vector
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.95       # shorter horizon — rewards matter in the next few seconds
        strength: 1.0
      curiosity:          # intrinsic reward for visiting novel states — helps solo exploration
        gamma: 0.99
        strength: 0.02
        encoding_size: 64
        learning_rate: 3.0e-4
    max_steps: 3000000    # 3M steps — enough to learn bomb/block basics
    time_horizon: 128     # fits a ~60s episode (3000 steps / 50Hz * 2 updates)
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 50000
